name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag to create, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: create-release-tag
  cancel-in-progress: false

jobs:
  create-release-tag:
    name: create-release-tag
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TAG_TOKEN || github.token }}

      - name: Validate requested version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "version must match vMAJOR.MINOR.PATCH, for example v1.2.3." >&2
            exit 1
          fi

          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          git fetch --tags --force origin

          if git show-ref --verify --quiet "refs/tags/${VERSION}"; then
            echo "Tag ${VERSION} already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists on origin." >&2
            exit 1
          fi

      - name: Create and push annotated release tag
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git checkout --detach refs/remotes/origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "refs/tags/${VERSION}"
