name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag to create, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: create-release-tag
  cancel-in-progress: false

jobs:
  create-release-tag:
    name: create-release-tag
    runs-on: ubuntu-24.04
    steps:
      - name: Check out main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Validate requested version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must match vMAJOR.MINOR.PATCH, for example v1.2.3." >&2
            exit 1
          fi

          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main

          if git show-ref --verify --quiet "refs/tags/${VERSION}"; then
            echo "Tag ${VERSION} already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists on origin." >&2
            exit 1
          fi

      - name: Verify release tag GitHub App configuration
        shell: bash
        env:
          RELEASE_TAG_APP_ID: ${{ vars.RELEASE_TAG_APP_ID }}
          RELEASE_TAG_APP_PRIVATE_KEY: ${{ secrets.RELEASE_TAG_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_TAG_APP_ID" ]]; then
            echo "RELEASE_TAG_APP_ID is required to create protected release tags." >&2
            exit 2
          fi

          if [[ -z "$RELEASE_TAG_APP_PRIVATE_KEY" ]]; then
            echo "RELEASE_TAG_APP_PRIVATE_KEY is required to create protected release tags." >&2
            exit 2
          fi

      - name: Create release tag GitHub App token
        id: release-tag-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          app-id: ${{ vars.RELEASE_TAG_APP_ID }}
          private-key: ${{ secrets.RELEASE_TAG_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Resolve release tag app bot identity
        id: release-tag-bot
        shell: bash
        env:
          APP_SLUG: ${{ steps.release-tag-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.release-tag-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -z "$APP_SLUG" ]]; then
            echo "Release tag GitHub App slug is required." >&2
            exit 2
          fi

          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Create and push annotated release tag
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_TAG_TOKEN: ${{ steps.release-tag-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
          TAGGER_NAME: ${{ steps.release-tag-bot.outputs.name }}
          TAGGER_EMAIL: ${{ steps.release-tag-bot.outputs.email }}
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_TAG_TOKEN" ]]; then
            echo "Release tag GitHub App token is required to create protected release tags." >&2
            exit 2
          fi

          git checkout --detach refs/remotes/origin/main
          git config user.name "$TAGGER_NAME"
          git config user.email "$TAGGER_EMAIL"
          git tag -a "$VERSION" -m "Release $VERSION"
          git remote set-url origin "https://x-access-token:${RELEASE_TAG_TOKEN}@github.com/${REPOSITORY}.git"
          git push origin "refs/tags/${VERSION}"
