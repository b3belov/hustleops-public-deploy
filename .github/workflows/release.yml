name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"

jobs:
  verify-release-source:
    name: verify-release-source
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Verify release tag is from main
        shell: bash
        run: bash scripts/ci/verify-release-tag-from-main.sh

  build-release:
    name: build-release
    runs-on: ubuntu-24.04
    needs:
      - verify-release-source
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/build-public-release-notes.mjs
          node --check scripts/validate-release-metadata.mjs
          node scripts/make-ci-env.mjs --output .hustleops/ci.env
          node scripts/validate-release-metadata.mjs \
            --env-file .hustleops/ci.env \
            --signature-plan-file .hustleops/image-signatures.tsv

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-public-release-notes.mjs \
            --output .hustleops/public-release-notes.md

  publish-release:
    name: publish-release
    runs-on: ubuntu-24.04
    needs:
      - build-release
    permissions:
      contents: write
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build release notes
        id: release
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-public-release-notes.mjs \
            --output .hustleops/public-release-notes.md \
            --github-output "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: HustleOps Public Deploy ${{ github.ref_name }}
          RELEASE_RECORD_FILE: ${{ steps.release.outputs.release_record_file }}
        run: |
          set -euo pipefail

          release_target="$(git rev-parse "refs/tags/${GITHUB_REF_NAME}^{commit}")"
          release_assets=(release-manifest.json release-verification.json)

          if [[ -n "$RELEASE_RECORD_FILE" && -f "$RELEASE_RECORD_FILE" ]]; then
            release_assets+=("$RELEASE_RECORD_FILE")
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file .hustleops/public-release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --target "$release_target" \
              --title "$RELEASE_TITLE" \
              --notes-file .hustleops/public-release-notes.md
          fi

          gh release upload "$RELEASE_TAG" "${release_assets[@]}" --clobber
