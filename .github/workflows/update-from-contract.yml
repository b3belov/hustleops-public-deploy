name: Update From Release Contract

on:
  workflow_dispatch:
    inputs:
      contract-ref:
        description: "Release contract OCI ref to consume"
        required: true
        default: ghcr.io/hustleops/hustleops-release-contract:latest

permissions:
  contents: read

env:
  ORAS_VERSION: 1.3.0
  CONTRACT_TRUST_ISSUER: https://token.actions.githubusercontent.com
  CONTRACT_CERTIFICATE_IDENTITY_PATTERN: https://github.com/HustleOps/hustleops-app/.github/workflows/release.yml@refs/tags/v*
  CONTRACT_CERTIFICATE_IDENTITY_REGEXP: ^https://github\.com/HustleOps/hustleops-app/\.github/workflows/release\.yml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$

jobs:
  update-from-contract:
    name: update-from-contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out public deploy repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Install ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6
        with:
          version: ${{ env.ORAS_VERSION }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a

      - name: Install ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Resolve, verify, and fetch release contract
        id: contract
        shell: bash
        env:
          CONTRACT_REF: ${{ inputs.contract-ref }}
        run: |
          set -euo pipefail
          mkdir -p .hustleops/contract

          CONTRACT_PACKAGE_REF="${CONTRACT_REF%@*}"
          CONTRACT_PACKAGE_REF="${CONTRACT_PACKAGE_REF%:*}"
          CONTRACT_DIGEST="$(oras resolve "$CONTRACT_REF")"
          CONTRACT_DIGEST_REF="${CONTRACT_PACKAGE_REF}@${CONTRACT_DIGEST}"

          cosign verify \
            --certificate-identity-regexp "$CONTRACT_CERTIFICATE_IDENTITY_REGEXP" \
            --certificate-oidc-issuer "$CONTRACT_TRUST_ISSUER" \
            "$CONTRACT_DIGEST_REF" >/dev/null

          oras pull "$CONTRACT_DIGEST_REF" -o .hustleops/contract
          contract_file="$(find .hustleops/contract -type f -name 'release-contract.json' -print -quit)"
          if [[ -z "$contract_file" ]]; then
            contract_file="$(find .hustleops/contract -type f -name '*.json' -print -quit)"
          fi
          if [[ -z "$contract_file" ]]; then
            echo "No JSON contract file was pulled from ${CONTRACT_DIGEST_REF}." >&2
            exit 1
          fi

          {
            echo "contract-ref=${CONTRACT_REF}"
            echo "contract-digest=${CONTRACT_DIGEST}"
            echo "contract-digest-ref=${CONTRACT_DIGEST_REF}"
            echo "contract-file=${contract_file}"
          } >> "$GITHUB_OUTPUT"

      - name: Update deploy files from verified contract
        shell: bash
        run: |
          set -euo pipefail
          node scripts/update-from-contract.mjs \
            --contract-file "${{ steps.contract.outputs.contract-file }}" \
            --contract-ref "${{ steps.contract.outputs.contract-ref }}" \
            --contract-digest "${{ steps.contract.outputs.contract-digest }}" \
            --expected-issuer "$CONTRACT_TRUST_ISSUER" \
            --certificate-identity-pattern "$CONTRACT_CERTIFICATE_IDENTITY_PATTERN" \
            --signature-plan-file .hustleops/image-signatures.tsv \
            --pr-body-file .hustleops/update-pr-body.md

      - name: Verify runtime image signatures
        shell: bash
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r image_ref certificate_identity issuer; do
            [[ -n "$image_ref" ]] || continue
            cosign verify \
              --certificate-identity "$certificate_identity" \
              --certificate-oidc-issuer "$issuer" \
              "$image_ref" >/dev/null
          done < .hustleops/image-signatures.tsv

      - name: Validate public deploy update
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/preflight.sh scripts/backup-postgres.sh scripts/run-migration.sh scripts/deploy.sh scripts/validate-nginx.sh
          shellcheck scripts/preflight.sh scripts/backup-postgres.sh scripts/run-migration.sh scripts/deploy.sh scripts/validate-nginx.sh
          node --check scripts/build-public-release-notes.mjs
          node --check scripts/update-from-contract.mjs
          node --check scripts/make-ci-env.mjs
          node --check scripts/validate-release-metadata.mjs
          docker run --rm \
            -v "$PWD:/repo:ro" \
            --workdir /repo \
            rhysd/actionlint:1.7.7
          node scripts/make-ci-env.mjs --output .hustleops/ci.env
          node --test tests/*.test.mjs
          node scripts/validate-release-metadata.mjs \
            --env-file .hustleops/ci.env \
            --signature-plan-file .hustleops/image-signatures.tsv

          docker compose --env-file .hustleops/ci.env -f docker-compose.prod.yml config >/dev/null
          docker compose --env-file .hustleops/ci.env -f docker-compose.prod.yml --profile ancillary-public config >/dev/null
          ./scripts/validate-nginx.sh
          ./scripts/preflight.sh --env-file .hustleops/ci.env --skip-pull --skip-signature-verify
          ./scripts/deploy.sh update \
            --env-file .hustleops/ci.env \
            --skip-pull \
            --skip-signature-verify \
            --skip-backup \
            --skip-bootstrap \
            --no-start \
            --dry-run \
            --yes

      - name: Detect public deploy changes
        id: public-deploy-changes
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync('${{ steps.contract.outputs.contract-file }}','utf8')); process.stdout.write(data.release.version)")"
          tag="v${version}"
          branch_name="automation/hustleops-${tag}-contract-update"

          if [[ -z "$(git status --porcelain -- .env.example deployment release-manifest.json release-verification.json releases)" ]]; then
            has_changes=false
            echo "No public deploy changes generated for ${tag}."
          else
            has_changes=true
          fi

          {
            echo "tag=${tag}"
            echo "branch-name=${branch_name}"
            echo "has-changes=${has_changes}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release GitHub App configuration for public deploy updates
        if: steps.public-deploy-changes.outputs.has-changes == 'true'
        shell: bash
        env:
          RELEASE_APP_ID: ${{ vars.RELEASE_APP_ID }}
          RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_APP_ID" ]]; then
            echo "RELEASE_APP_ID is required to push the automation update branch." >&2
            exit 2
          fi

          if [[ -z "$RELEASE_APP_PRIVATE_KEY" ]]; then
            echo "RELEASE_APP_PRIVATE_KEY is required to push the automation update branch." >&2
            exit 2
          fi

      - name: Create release GitHub App token for public deploy updates
        if: steps.public-deploy-changes.outputs.has-changes == 'true'
        id: public-deploy-update-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Resolve public deploy update app bot identity
        if: steps.public-deploy-changes.outputs.has-changes == 'true'
        id: public-deploy-update-bot
        shell: bash
        env:
          APP_SLUG: ${{ steps.public-deploy-update-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.public-deploy-update-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -z "$APP_SLUG" ]]; then
            echo "Public deploy update GitHub App slug is required." >&2
            exit 2
          fi

          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Open or update public deploy update PR
        if: steps.public-deploy-changes.outputs.has-changes == 'true'
        shell: bash
        env:
          BRANCH_PUSH_TOKEN: ${{ steps.public-deploy-update-token.outputs.token }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.public-deploy-changes.outputs.tag }}
          BRANCH_NAME: ${{ steps.public-deploy-changes.outputs.branch-name }}
          COMMITTER_NAME: ${{ steps.public-deploy-update-bot.outputs.name }}
          COMMITTER_EMAIL: ${{ steps.public-deploy-update-bot.outputs.email }}
        run: |
          set -euo pipefail

          if [[ -z "$BRANCH_PUSH_TOKEN" ]]; then
            echo "Public deploy update GitHub App token is required to push the automation update branch." >&2
            exit 2
          fi

          if [[ -z "$GH_TOKEN" ]]; then
            echo "GitHub Actions token is required to open or update the public deploy update PR." >&2
            exit 2
          fi

          git config user.name "$COMMITTER_NAME"
          git config user.email "$COMMITTER_EMAIL"
          git checkout -B "$BRANCH_NAME"
          git add .env.example deployment release-manifest.json release-verification.json releases
          git commit -m "chore(release): update public deploy for ${TAG}"

          remote_branch="refs/heads/${BRANCH_NAME}"
          push_url="https://x-access-token:${BRANCH_PUSH_TOKEN}@github.com/${REPOSITORY}.git"
          remote_ref_file="$(mktemp)"

          if git ls-remote --exit-code --heads "$push_url" "$remote_branch" > "$remote_ref_file" 2>/dev/null; then
            remote_oid="$(awk 'NR == 1 { print $1 }' "$remote_ref_file")"
            if [[ -z "$remote_oid" ]]; then
              echo "Unable to resolve existing remote update branch ${BRANCH_NAME}." >&2
              exit 1
            fi
            git push --force-with-lease="${remote_branch}:${remote_oid}" "$push_url" "HEAD:${remote_branch}"
          else
            status=$?
            if [[ "$status" -eq 2 ]]; then
              git push "$push_url" "HEAD:${remote_branch}"
            else
              echo "Unable to inspect remote update branch; check GitHub App contents permission." >&2
              exit "$status"
            fi
          fi

          existing_pr_url="$(gh pr list --repo "$REPOSITORY" --head "$BRANCH_NAME" --json url --jq '.[0].url // ""')"
          if [[ -n "$existing_pr_url" ]]; then
            gh pr edit "$existing_pr_url" \
              --title "chore(release): update public deploy for ${TAG}" \
              --body-file .hustleops/update-pr-body.md
            echo "Updated ${existing_pr_url}"
          else
            gh pr create \
              --repo "$REPOSITORY" \
              --base main \
              --head "$BRANCH_NAME" \
              --title "chore(release): update public deploy for ${TAG}" \
              --body-file .hustleops/update-pr-body.md
          fi
