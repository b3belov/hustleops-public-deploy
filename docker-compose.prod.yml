# Managed by HustleOps release automation.
# Backend and frontend use published runtime images.
# nginx uses the stock image and mounts the checked-in config in this repository.

x-n8n-common: &n8n-common
  image: docker.n8n.io/n8nio/n8n:2.13.4
  restart: unless-stopped
  environment: &n8n-env
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: n8n-postgres
    DB_POSTGRESDB_PORT: 5432
    DB_POSTGRESDB_DATABASE: n8n
    DB_POSTGRESDB_USER: n8n
    DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD}
    EXECUTIONS_MODE: queue
    QUEUE_BULL_REDIS_HOST: n8n-redis
    QUEUE_BULL_REDIS_PORT: 6379
    QUEUE_BULL_REDIS_PASSWORD: ${N8N_REDIS_PASSWORD}
    N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    N8N_RUNNERS_ENABLED: "true"
    N8N_RUNNERS_MODE: external
    N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
    N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
  depends_on:
    n8n-postgres:
      condition: service_healthy
    n8n-redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Keep main HustleOps postgres data on the host filesystem.
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  opensearch:
    image: opensearchproject/opensearch:2
    restart: unless-stopped
    environment:
      cluster.name: hustleops-cluster
      node.name: hustleops-node
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      # Keep search indices across redeploys and rollbacks.
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD https://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shared-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      SERVER_HOST: 0.0.0.0
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - shared-network

  backend:
    image: ${HUSTLEOPS_BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=15&pool_timeout=30
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: ${CORS_ORIGIN}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook
      LOG_ERROR_STACK: "false"
      OPENSEARCH_NODE: https://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    volumes:
      # Keep user-uploaded chat files and screenshots on the host filesystem.
      - ./data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network
      - shared-network

  frontend:
    image: ${HUSTLEOPS_FRONTEND_IMAGE}
    restart: unless-stopped
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
    ports:
      - "80:80"
      - "5678:5678"
      - "5601:5601"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      n8n:
        condition: service_started
      opensearch-dashboards:
        condition: service_started
    networks:
      - edge-network
      - app-network
      - shared-network

  n8n-postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD}
    volumes:
      # Keep n8n postgres data on the host filesystem.
      - ./data/n8n/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  n8n-redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${N8N_REDIS_PASSWORD}
    volumes:
      # Keep n8n queue broker state across restarts.
      - n8n_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${N8N_REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  n8n:
    <<: *n8n-common
    environment:
      <<: *n8n-env
    volumes:
      # Keep workflows, credentials, and execution metadata across redeploys.
      - n8n_data:/home/node/.n8n
    networks:
      - n8n-network
      - shared-network

  n8n-worker:
    <<: *n8n-common
    command: worker
    depends_on:
      n8n-postgres:
        condition: service_healthy
      n8n-redis:
        condition: service_healthy
      n8n:
        condition: service_started
    networks:
      - n8n-network

  task-runner-main:
    image: n8nio/runners:2.13.4
    restart: unless-stopped
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
    depends_on:
      n8n:
        condition: service_started
    networks:
      - n8n-network

  task-runner-worker:
    image: n8nio/runners:2.13.4
    restart: unless-stopped
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n-worker:5679
    depends_on:
      n8n-worker:
        condition: service_started
    networks:
      - n8n-network

volumes:
  redis_data:
  opensearch_data:
  n8n_data:
  n8n_redis_data:

networks:
  edge-network:
  app-network:
  shared-network:
  n8n-network: