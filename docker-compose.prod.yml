# Managed by HustleOps release automation.
# Backend, frontend, and migration services use published runtime images.
# nginx uses unprivileged runtime images and mounts the checked-in config in this repository.

x-runtime-hardening: &runtime-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-node-runtime-hardening: &node-runtime-hardening
  <<: *runtime-hardening
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=64m

x-nginx-runtime-hardening: &nginx-runtime-hardening
  <<: *runtime-hardening
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=101,gid=101,mode=1777
    - /var/cache/nginx:rw,noexec,nosuid,nodev,size=32m,uid=101,gid=101,mode=0755
    - /run:rw,noexec,nosuid,nodev,size=4m,uid=101,gid=101,mode=0755

x-n8n-common: &n8n-common
  image: docker.n8n.io/n8nio/n8n:2.21.0@sha256:4b8acf6a9e21ee4234850557b3c1c46b940f4025a8ddb0f697f858b788103ebe
  restart: unless-stopped
  environment: &n8n-env
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: n8n-postgres
    DB_POSTGRESDB_PORT: 5432
    DB_POSTGRESDB_DATABASE: n8n
    DB_POSTGRESDB_USER: n8n
    DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD}
    EXECUTIONS_MODE: queue
    QUEUE_BULL_REDIS_HOST: n8n-redis
    QUEUE_BULL_REDIS_PORT: 6379
    QUEUE_BULL_REDIS_PASSWORD: ${N8N_REDIS_PASSWORD}
    N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    N8N_RUNNERS_ENABLED: "true"
    N8N_RUNNERS_MODE: external
    N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
    N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
  depends_on:
    n8n-postgres:
      condition: service_healthy
    n8n-redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Keep main HustleOps postgres data on the host filesystem.
      - ./data/postgres:/var/lib/postgresql
      - ./logs/postgres:/var/log/hustleops:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:8-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
      - ./logs/redis:/var/log/hustleops:rw
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  opensearch:
    image: opensearchproject/opensearch:3@sha256:57bd3c879ad27123a9a6cd75e2adba504189d3131d00a669f3baf9210bc4538c
    restart: unless-stopped
    profiles:
      - ancillary-public
    environment:
      cluster.name: hustleops-cluster
      node.name: hustleops-node
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      # Keep search indices across redeploys and rollbacks.
      - ./data/opensearch:/usr/share/opensearch/data
      - ./logs/opensearch:/var/log/hustleops:rw
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sk -u admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD https://localhost:9200/_cluster/health | grep -q ''"status"''',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shared-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3@sha256:9fe2cbf1d82c3f66a0860ed140415692ce55de4711ed7877ab738e5da1a357c0
    restart: unless-stopped
    profiles:
      - ancillary-public
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      SERVER_HOST: 0.0.0.0
      DATA_SOURCE_ENABLED: "true"
      WORKSPACE_ENABLED: "true"
      EXPLORE_ENABLED: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./data/opensearch-dashboards:/usr/share/opensearch-dashboards/data
      - ./logs/opensearch-dashboards:/var/log/hustleops:rw
    networks:
      - shared-network

  backend:
    <<: *node-runtime-hardening
    image: ${HUSTLEOPS_BACKEND_IMAGE}
    platform: linux/amd64
    restart: unless-stopped
    environment:
      HOME: /tmp
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=15&pool_timeout=30
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: ${CORS_ORIGIN}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook
      LOG_ERROR_STACK: "false"
      LOG_FILE_FORCE_DISABLED: ${HUSTLEOPS_FORCE_STDOUT_LOGGING:-true}
      OPENSEARCH_NODE: https://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    volumes:
      # Keep user-uploaded chat files and screenshots on the host filesystem.
      - ./data/uploads:/app/uploads:rw
      - ./logs/backend:/app/logs:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/live').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network
      - shared-network

  backend-migrate:
    <<: *node-runtime-hardening
    image: ${HUSTLEOPS_BACKEND_MIGRATION_IMAGE}
    platform: linux/amd64
    restart: "no"
    environment:
      HOME: /tmp
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=15&pool_timeout=30
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs/backend-migrate:/app/logs:rw
    profiles:
      - migration
    networks:
      - app-network

  backend-bootstrap:
    <<: *node-runtime-hardening
    image: ${HUSTLEOPS_BACKEND_MIGRATION_IMAGE}
    platform: linux/amd64
    entrypoint: ["node"]
    command: ["dist/prisma/bootstrap.js"]
    restart: "no"
    environment:
      HOME: /tmp
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=15&pool_timeout=30
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs/backend-bootstrap:/app/logs:rw
    profiles:
      - bootstrap
    networks:
      - app-network

  frontend:
    <<: *nginx-runtime-hardening
    image: ${HUSTLEOPS_FRONTEND_IMAGE}
    platform: linux/amd64
    restart: unless-stopped
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./logs/frontend:/var/log/hustleops:rw
    networks:
      - app-network

  nginx:
    <<: *nginx-runtime-hardening
    image: nginxinc/nginx-unprivileged:1.30-alpine@sha256:808f7846d21a9c94cf53833e8807a00a33fd0b65cc47fb05b79efe366c2d201f
    restart: unless-stopped
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/security-headers-no-csp.conf:/etc/nginx/security-headers-no-csp.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
      - ${NGINX_TLS_CERT_PATH:-./nginx/certs/fullchain.pem}:/etc/nginx/tls/fullchain.pem:ro
      - ${NGINX_TLS_KEY_PATH:-./nginx/certs/privkey.pem}:/etc/nginx/tls/privkey.pem:ro
      - ./logs/nginx:/var/log/hustleops:rw
    ports:
      - "${NGINX_HTTP_BIND:-0.0.0.0}:80:8080"
      - "${NGINX_HTTPS_BIND:-0.0.0.0}:443:8443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - edge-network
      - app-network

  nginx-ancillary:
    <<: *nginx-runtime-hardening
    image: nginxinc/nginx-unprivileged:1.30-alpine@sha256:808f7846d21a9c94cf53833e8807a00a33fd0b65cc47fb05b79efe366c2d201f
    restart: unless-stopped
    profiles:
      - ancillary-public
    labels:
      io.hustleops.release.tag: "${HUSTLEOPS_RELEASE_TAG}"
      io.hustleops.release.trigger: "${HUSTLEOPS_RELEASE_TRIGGER}"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./nginx/nginx.ancillary.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/security-headers-no-csp.conf:/etc/nginx/security-headers-no-csp.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
      - ${NGINX_TLS_CERT_PATH:-./nginx/certs/fullchain.pem}:/etc/nginx/tls/fullchain.pem:ro
      - ${NGINX_TLS_KEY_PATH:-./nginx/certs/privkey.pem}:/etc/nginx/tls/privkey.pem:ro
      - ./logs/nginx-ancillary:/var/log/hustleops:rw
    ports:
      - "${ANCILLARY_N8N_BIND:-0.0.0.0}:5678:5678"
      - "${ANCILLARY_DASHBOARDS_BIND:-0.0.0.0}:5601:5601"
    depends_on:
      n8n:
        condition: service_healthy
      opensearch-dashboards:
        condition: service_started
    networks:
      - edge-network
      - shared-network

  n8n-postgres:
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD}
    volumes:
      # Keep n8n postgres data on the host filesystem.
      - ./data/n8n/postgres:/var/lib/postgresql
      - ./logs/n8n-postgres:/var/log/hustleops:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  n8n-redis:
    image: redis:8-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    restart: unless-stopped
    command: redis-server --requirepass ${N8N_REDIS_PASSWORD}
    volumes:
      # Keep n8n queue broker state across restarts.
      - ./data/n8n/redis:/data
      - ./logs/n8n-redis:/var/log/hustleops:rw
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${N8N_REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  n8n:
    <<: *n8n-common
    environment:
      <<: *n8n-env
    volumes:
      # Keep workflows, credentials, and execution metadata across redeploys.
      - ./data/n8n/app:/home/node/.n8n
      - ./logs/n8n:/var/log/hustleops:rw
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5678/healthz/readiness').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - n8n-network
      - shared-network

  n8n-worker:
    <<: *n8n-common
    command: worker
    depends_on:
      n8n-postgres:
        condition: service_healthy
      n8n-redis:
        condition: service_healthy
      n8n:
        condition: service_started
    volumes:
      - ./logs/n8n-worker:/var/log/hustleops:rw
    networks:
      - n8n-network

  task-runner-main:
    image: n8nio/runners:2.21.0@sha256:cc21bbe116bdf915d9ab4837abeffefc2785ce326e059aed4fc1dd2ff1c4ea74
    restart: unless-stopped
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
    depends_on:
      n8n:
        condition: service_started
    volumes:
      - ./logs/task-runner-main:/var/log/hustleops:rw
    networks:
      - n8n-network

  task-runner-worker:
    image: n8nio/runners:2.21.0@sha256:cc21bbe116bdf915d9ab4837abeffefc2785ce326e059aed4fc1dd2ff1c4ea74
    restart: unless-stopped
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n-worker:5679
    depends_on:
      n8n-worker:
        condition: service_started
    volumes:
      - ./logs/task-runner-worker:/var/log/hustleops:rw
    networks:
      - n8n-network

networks:
  edge-network:
  app-network:
  shared-network:
  n8n-network:
