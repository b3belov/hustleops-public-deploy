# Security headers that are safe for proxied ancillary applications.
#
# Do not add Content-Security-Policy here. Some upstream applications, including
# OpenSearch Dashboards, emit their own CSP and browsers enforce every CSP
# header they receive.

# HSTS is emitted only by HTTPS server blocks. Plain HTTP listeners must redirect
# to HTTPS without declaring transport security before TLS is active.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
