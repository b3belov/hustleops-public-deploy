# Security headers that are safe for proxied ancillary applications.
#
# Do not add Content-Security-Policy here. Some upstream applications, including
# OpenSearch Dashboards, emit their own CSP and browsers enforce every CSP
# header they receive.

# HSTS is intentionally NOT emitted here. This container listens on port 80
# only, so the trusted HTTPS boundary lives at the upstream TLS terminator
# (load balancer / CDN). That terminator must add Strict-Transport-Security
# after stripping any client-supplied forwarding headers.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
