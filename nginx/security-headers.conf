# Security headers included at server level for fallback coverage.
#
# IMPORTANT: nginx add_header inheritance rule — when a child location block uses
# add_header, ALL parent-level add_header directives are silently discarded. Keep
# this file included at server{} scope, then re-include it only inside child
# locations that define their own add_header directives (for example, immutable
# asset caching). Removing the child include will silently strip these headers
# from that response type.

# HSTS is intentionally NOT emitted here. This container listens on port 80
# only, so the trusted HTTPS boundary lives at the upstream TLS terminator
# (load balancer / CDN). That terminator must add Strict-Transport-Security
# after stripping any client-supplied forwarding headers.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# CSP covers the frontend HTML shell served by nginx.
# The backend helmet CSP covers API JSON responses only.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:" always;